<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compliance Genie 合規精靈 - 交叉分析與洞察儀表板</title>
    <meta name="description" content="AI-Native 金融消費爭議合規工作台 - 搜尋、分析、引法、諮詢一體化解決方案">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 2L2 7L12 12L22 7L12 2Z' fill='url(%23grad1)' /%3E%3Cpath d='M2 17L12 22L22 17' stroke='url(%23grad2)' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' /%3E%3Cpath d='M2 12L12 17L22 12' stroke='url(%23grad2)' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' /%3E%3Cdefs%3E%3ClinearGradient id='grad1' x1='2' y1='2' x2='22' y2='12' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0%25' stop-color='%23C5A059' /%3E%3Cstop offset='100%25' stop-color='%231E3A8A' /%3E%3C/linearGradient%3E%3ClinearGradient id='grad2' x1='2' y1='12' x2='22' y2='22' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0%25' stop-color='%23C5A059' /%3E%3Cstop offset='100%25' stop-color='%231E3A8A' /%3E%3C/linearGradient%3E%3C/defs%3E%3C/svg%3E">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Custom Stylesheets -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/workspace.css?v=2.0">
    <style>
        /* Segmented Control Styles (Retained from Pill Demo) */
        .segmented-nav {
            display: inline-flex;
            align-items: center;
            background: rgba(15, 23, 42, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.08);
            padding: 3px;
            border-radius: 20px;
            gap: 3px;
            backdrop-filter: blur(10px);
        }

        .segmented-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 16px;
            border: none;
            background: transparent;
            font-size: 0.82rem;
            font-weight: 500;
            color: #64748b;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
        }

        .segmented-btn:hover {
            color: #1e293b;
        }

        .segmented-btn.active {
            background: #ffffff;
            color: #1e3a8a;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .badge-new {
            font-size: 0.65rem;
            background: linear-gradient(135deg, #c5a059, #b38b40);
            color: white;
            padding: 1px 6px;
            border-radius: 8px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        /* Filter Wrapper overrides for Dashboard */
        .search-wrapper {
            max-width: 480px !important; 
        }

        /* Dashboard Specific Layout */
        .dashboard-container {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            height: 100%;
            overflow-y: auto;
            padding: 0.5rem 1rem 2rem 0.5rem;
        }

        .dashboard-container::-webkit-scrollbar {
            width: 6px;
        }
        .dashboard-container::-webkit-scrollbar-thumb {
            background-color: rgba(15, 23, 42, 0.2);
            border-radius: 10px;
        }

        /* AI Narrative Insight Card */
        .insight-hero-card {
            background: linear-gradient(145deg, rgba(30, 58, 138, 0.03), rgba(197, 160, 89, 0.05));
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            position: relative;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(12px);
        }

        .insight-hero-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: linear-gradient(to bottom, #1E3A8A, #C5A059);
            border-top-left-radius: var(--radius-lg);
            border-bottom-left-radius: var(--radius-lg);
        }

        .insight-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            color: #1e3a8a;
            margin-bottom: 0.75rem;
        }

        .insight-text {
            font-size: 0.95rem;
            line-height: 1.7;
            color: #334155;
            font-weight: 500;
            max-height: 280px;
            overflow-y: auto;
        }
        .insight-text::-webkit-scrollbar { width: 4px; }
        .insight-text::-webkit-scrollbar-thumb { background: rgba(197,160,89,0.3); border-radius: 4px; }

        /* Markdown rendered elements */
        .insight-text p { margin: 0 0 0.5rem 0; }
        .insight-text ul, .insight-text ol { margin: 0.25rem 0 0.5rem 1.2rem; padding: 0; }
        .insight-text li { margin-bottom: 0.2rem; }
        .insight-text strong { background: rgba(197, 160, 89, 0.15); color: #997b43; padding: 0 4px; border-radius: 4px; font-weight: 600; }
        .insight-text h1, .insight-text h2, .insight-text h3 { font-family: 'Outfit', sans-serif; color: #1e3a8a; margin: 0.5rem 0 0.25rem 0; }
        .insight-text h1 { font-size: 1.1rem; }
        .insight-text h2 { font-size: 1rem; }
        .insight-text h3 { font-size: 0.95rem; }
        .insight-text code { background: rgba(30,58,138,0.06); padding: 1px 5px; border-radius: 4px; font-size: 0.88rem; }
        .insight-text blockquote { border-left: 3px solid var(--accent-gold); margin: 0.5rem 0; padding: 0.25rem 0.75rem; color: #64748b; background: rgba(197,160,89,0.04); border-radius: 0 6px 6px 0; }
        
        .insight-text highlight {
            background: rgba(197, 160, 89, 0.15);
            color: #997b43;
            padding: 0 4px;
            border-radius: 4px;
            font-weight: 600;
        }

        /* Dashboard Grid System */
        .dash-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.25rem;
        }

        .dash-card {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .dash-card-full {
            grid-column: span 2;
        }

        .dash-card-header {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            color: var(--text-main);
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding-bottom: 0.75rem;
        }

        /* Visualizations Mockups */
        .dist-bar-container {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .dist-label { font-size: 0.85rem; color: var(--text-muted); display: flex; justify-content: space-between; }
        .dist-bar-bg { width: 100%; height: 8px; background: rgba(0,0,0,0.05); border-radius: 4px; overflow: hidden; }
        .dist-bar-fill { height: 100%; border-radius: 4px; }

        /* Network nodes */
        .network-container {
            position: relative;
            height: 280px;
            background: radial-gradient(circle at center, rgba(30, 58, 138, 0.02) 0%, transparent 70%);
            border-radius: var(--radius-md);
            overflow: hidden;
        }
        .network-container svg.graph-lines {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .net-node {
            position: absolute;
            padding: 0.35rem 0.7rem;
            background: white;
            border: 1.5px solid var(--accent-gold);
            color: var(--accent-gold-dark);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(197, 160, 89, 0.15);
            z-index: 2;
            white-space: nowrap;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: default;
        }
        .net-node:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 18px rgba(197, 160, 89, 0.3);
        }
        .net-node.node-law {
            border-color: var(--accent-gold);
            color: var(--accent-gold-dark);
            background: linear-gradient(135deg, #fffbeb, #fef3c7);
            border-width: 2px;
            font-size: 0.8rem;
        }
        .net-node.node-obligation {
            border-color: #3b82f6;
            color: #1d4ed8;
            background: #eff6ff;
        }
        .net-node.node-consequence {
            border-color: #ef4444;
            color: #b91c1c;
            background: #fef2f2;
        }
        .net-node.node-case {
            border-color: #10b981;
            color: #065f46;
            background: #ecfdf5;
        }
        .net-node .node-icon {
            display: inline-block;
            margin-right: 3px;
        }

        /* Metrics cards */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        .metric-item {
            background: white;
            border: 1px solid rgba(0,0,0,0.04);
            border-radius: var(--radius-md);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .metric-value {
            font-size: 1.75rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            color: #1e3a8a;
        }
        .metric-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }
    </style>
</head>

<body>
    <!-- Ambient background lighting -->
    <div class="orb orb-left"></div>
    <div class="orb orb-right"></div>
    
    <!-- Header -->
    <header style="position: relative;">
        <div class="brand-logo" onclick="location.href='../index.html'">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="url(#grad1)" />
                <path d="M2 17L12 22L22 17" stroke="url(#grad2)" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
                <path d="M2 12L12 17L22 12" stroke="url(#grad2)" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
                <defs>
                    <linearGradient id="grad1" x1="2" y1="2" x2="22" y2="12" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#C5A059" />
                        <stop offset="100%" stop-color="#1E3A8A" />
                    </linearGradient>
                    <linearGradient id="grad2" x1="2" y1="12" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#C5A059" />
                        <stop offset="100%" stop-color="#1E3A8A" />
                    </linearGradient>
                </defs>
            </svg>
            <h2>Compliance Genie 合規精靈</h2>
        </div>

        <div class="header-actions">
            <button class="export-btn" onclick="triggerExport()">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                <span>匯出報告</span>
            </button>
            <div class="user-profile">
                <div class="user-avatar">林</div>
                <div>
                    <div class="user-name">林專員</div>
                    <div class="user-role">金融合規部</div>
                </div>
            </div>
        </div>
    </header>

    <!-- Search Section (Now acting as Filter/Settings) -->
    <section class="search-section" style="position: relative;">
        <!-- Centered Hero Pill Container (Aligned to search-wrapper top) -->
        <div class="hero-pill-container"
            style="position: absolute; left: 50%; top: var(--gap); transform: translateX(-50%); z-index: 10;">
            <div class="segmented-nav">
                <button class="segmented-btn" title="切換回單一案件處置" onclick="location.href='v2_workspace_pill.html'">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                    </svg>
                    <span>案件處置工作台</span>
                </button>
                <button class="segmented-btn active" title="目前視圖：巨觀交叉分析與知識圖譜">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span>交叉分析與洞察儀表板</span>
                    <span class="badge-new">NEW</span>
                </button>
            </div>
        </div>

        <div class="search-wrapper">
            <!-- Filter Dropdowns instead of Search Bar -->
            <div style="display: flex; gap: 0.5rem; flex: 1;">
                <select id="filter-category" class="search-input" style="flex: 1; border-radius: var(--radius-md); padding-left: 0.5rem; font-size: 0.85rem; color: #475569; font-weight: 500; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); background: white;">
                    <option value="" disabled selected>爭議類別</option>
                    <option value="all">全部類別</option>
                    <option value="investment">投資型商品</option>
                    <option value="insurance">醫療理賠</option>
                    <option value="creditcard">信用卡交易</option>
                </select>
                <select id="filter-product" class="search-input" style="flex: 1; border-radius: var(--radius-md); padding-left: 0.5rem; font-size: 0.85rem; color: #475569; font-weight: 500; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); background: white;">
                    <option value="" disabled selected>商品類型</option>
                    <option value="all">全部商品</option>
                    <option value="fund">共同基金</option>
                    <option value="policy">結構型保單</option>
                    <option value="loan">信貸產品</option>
                </select>
                <select id="filter-segment" class="search-input" style="flex: 1; border-radius: var(--radius-md); padding-left: 0.5rem; font-size: 0.85rem; color: #475569; font-weight: 500; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); background: white;">
                    <option value="" disabled selected>客戶分群</option>
                    <option value="all">不限</option>
                    <option value="senior">高齡族群</option>
                    <option value="vip">高資產客戶</option>
                </select>
            </div>
            <button id="load-analysis-btn" class="search-btn" onclick="loadBatchAnalysis()">
                <span>載入分析</span>
            </button>
        </div>
        <div class="quick-tags">
            <span>最新批次快速篩選:</span>
            <button class="tag-btn" onclick="applyQuickFilter('credit')">2023 Q4 信用卡高風險</button>
            <button class="tag-btn" onclick="applyQuickFilter('senior_invest')">投資型保單 (高齡客群)</button>
        </div>
    </section>

    <!-- Main Dashboard Workspace -->
    <main id="dashboard-main-content" class="workspace-container" style="display: block; overflow: hidden; padding-right: 0; transition: opacity 0.3s ease;">
        <div class="dashboard-container">
            
            <!-- Narrative Insight Engine (FR-08) -->
            <div class="insight-hero-card">
                <div class="insight-title">
                    <svg width="20" height="20" fill="none" stroke="#c5a059" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"></path>
                    </svg>
                    Narrative Insight 敘事性洞察 (FR-08)
                </div>
                <div id="narrative-insight-text" class="insight-text">
                    請點擊左側「載入分析」以生成最新批次之敘事洞察分析報告...
                </div>
            </div>

            <!-- Dash Grid -->
            <div class="dash-grid">
                
                <!-- Cross-Analysis Dashboard (FR-09) -->
                <div class="dash-card">
                    <div class="dash-card-header">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                        跨維度交叉分析矩陣 (FR-09)
                    </div>
                    <div style="overflow-x: auto; margin-top: 0.5rem;">
                        <table style="width: 100%; border-collapse: collapse; font-size: 0.85rem; text-align: center;">
                            <thead>
                                <tr>
                                    <th style="border-bottom: 2px solid #e2e8f0; padding: 6px; text-align: left; color: var(--text-muted);">商品 × 法規 \ 風險</th>
                                    <th style="border-bottom: 2px solid #e2e8f0; padding: 6px; color: #ef4444;">高風險</th>
                                    <th style="border-bottom: 2px solid #e2e8f0; padding: 6px; color: #f59e0b;">中風險</th>
                                    <th style="border-bottom: 2px solid #e2e8f0; padding: 6px; color: #10b981;">低風險</th>
                                </tr>
                            </thead>
                            <tbody id="matrix-tbody">
                                <tr>
                                    <td colspan="4" style="padding: 12px; color: #94a3b8;">等待資料載入中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Compliance Knowledge Graph (FR-10) -->
                <div class="dash-card">
                    <div class="dash-card-header">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                        知識探索圖譜 (FR-10)
                    </div>
                    <div id="knowledge-graph" class="network-container">
                        <!-- 由 JS 動態渲染知識圖譜節點與連線 -->
                        <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #94a3b8; font-size: 0.85rem;">等待資料載入中...</div>
                    </div>
                </div>

                <!-- Case Intelligence -->
                <div class="dash-card dash-card-full">
                    <div class="dash-card-header">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                        Case Intelligence (案件智能指標)
                    </div>
                    <div class="metrics-grid">
                        <div class="metric-item">
                            <span class="metric-label">平均引用法規數 (案件複雜度)</span>
                            <span id="metric-avg-law" class="metric-value">--</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label">最高風險佔比商品</span>
                            <span id="metric-high-risk-product" class="metric-value" style="font-size: 1.4rem; padding-top: 0.35rem;">--</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label">單案平均爭議涉案金額</span>
                            <span id="metric-avg-amount" class="metric-value">--</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="../js/config.js?v=2"></script>
    <script src="../js/workspace_analytical.js?v=1"></script>
    <script>
        // 初始化呼叫載入分析
        window.onload = () => {
            loadBatchAnalysis();
        };
    </script>
</body>

</html>
