<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API 連線測試工具</title>
  <!-- Custom Stylesheets & Config -->
  <link rel="stylesheet" href="../css/test_api.css">
  <script src="../js/config.js"></script>
</head>
<body>

  <div class="card">
    <h2>1. 測試 Live Server Proxy 連線</h2>
    <p>這會呼叫 <code>/geminidata_api/v1/chat/list</code>，由 Live Server 代為轉發給真實後端。</p>
    <button onclick="testProxy()">開始測試 Proxy 連線</button>
    <div id="proxy-status" class="status"></div>
    <pre id="proxy-result">等待測試...</pre>
  </div>

  <div class="card">
    <h2>2. 測試直接連線 (不經過 Proxy)</h2>
    <p>這會直接呼叫 <code>https://cloud.geminidata.com/api/v1/chat/list</code>，通常會被 CORS 擋下。</p>
    <button onclick="testDirect()">開始測試直接連線</button>
    <div id="direct-status" class="status"></div>
    <pre id="direct-result">等待測試...</pre>
  </div>

  <script>
    const headers = {
      'Content-Type': 'application/json'
    };

    async function runTest(url, statusElId, resultElId) {
      const statusEl = document.getElementById(statusElId);
      const resultEl = document.getElementById(resultElId);
      
      statusEl.textContent = '連線中...';
      statusEl.className = 'status';
      resultEl.textContent = '請稍候...';

      try {
        const response = await fetch(url, { headers });
        
        // 讀取回應內容 (可能是 JSON，也可能是純文字錯誤訊息)
        const text = await response.text();
        let formattedData = text;
        try {
            formattedData = JSON.stringify(JSON.parse(text), null, 2);
        } catch(e) {
            // Not JSON
        }

        if (response.ok) {
          statusEl.textContent = `✅ 連線成功！HTTP 狀態碼: ${response.status}`;
          statusEl.className = 'status success';
        } else {
          statusEl.textContent = `❌ 伺服器回傳錯誤！HTTP 狀態碼: ${response.status}`;
          statusEl.className = 'status error';
        }

        resultEl.textContent = `--- 回應狀態 (Status) ---\n${response.status} ${response.statusText}\n\n--- 伺服器回傳內容 (Body) ---\n${formattedData}`;

      } catch (error) {
        statusEl.textContent = '❌ 連線失敗 (可能被 CORS 擋住，或伺服器沒開)';
        statusEl.className = 'status error';
        resultEl.textContent = error.toString();
      }
    }

    function testProxy() {
      // 測試透過 Live Server Proxy
      runTest('/geminidata_api/v1/chat/list', 'proxy-status', 'proxy-result');
    }

    function testDirect() {
      // 測試直接連線 (未經 Proxy)
      runTest('https://cloud.geminidata.com/api/v1/chat/list', 'direct-status', 'direct-result');
    }
  </script>
</body>
</html>
